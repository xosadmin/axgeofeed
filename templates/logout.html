<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logout - AXGeofeed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <link rel="stylesheet" href="{{url_for('static',filename='css/logout.css')}}">
</head>
<body>
    <div class="logout-wrapper">
    <div class="logout-card text-center">
        <div class="logout-icon">
            <ion-icon name="hand-right-outline"></ion-icon>
        </div>

        <h1 class="logout-title">All done. See ya!</h1>
        <p class="logout-subtitle">You have been logged out successfully.</p>

        <div class="logout-actions">
            <button type="button" class="btn btn-primary-modern" onclick="window.location.replace('/')">
                Back to homepage
            </button>
            <button type="button" class="btn btn-soft" onclick="window.close()">
                Close this page
            </button>
        </div>
    </div>
</div>
</body>
</html>
