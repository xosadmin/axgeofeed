<!DOCTYPE html>
<html lang="en">
<head>
  <title>{% block title %}Welcome - AXGeofeed{% endblock %}</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  <link rel="stylesheet" href="{{url_for('static',filename='css/main.css')}}">
  {% block additionalHead %}
  {% endblock %}
</head>
<body>
<div class="container mt-3">
  <div class="d-flex justify-content-between align-items-center">
    <h2><a href="/" title="AXGeofeed" style="color:black; text-decoration: none;"><span style="font-size: 17pt;">
      <ion-icon name="earth-outline"></ion-icon></span> AXGeofeed</a></h2>
    <div class="btn-group">
      <button class="btn btn-outline-light text-dark" onclick="window.location.href = '/';"><ion-icon name="home-outline"></ion-icon> Homepage</button>
      <button class="btn btn-outline-light text-dark" onclick="window.location.href = '/assets';"><ion-icon name="boat-outline"></ion-icon> AS-SET Management</button>
      <button class="btn btn-outline-light text-dark" onclick="window.location.href = '/blacklistprefix';"><ion-icon name="ban-outline"></ion-icon> Blacklisted Prefix</button>
      <button class="btn btn-outline-light text-dark" onclick="window.location.href = '/users';"><ion-icon name="people-outline"></ion-icon> User Management</button>
      <button class="btn btn-outline-light text-dark" onclick="window.location.href = '/apis';"><ion-icon name="lock-closed-outline"></ion-icon> API Tokens</button>
      <button class="btn btn-outline-light text-dark" onclick="window.location.href = '/logout';"><ion-icon name="log-out-outline"></ion-icon> Logout</button>
    </div>
  </div>
</div>
{% block header %}
{% endblock %}

<div id="mainContent" class="container mt-3">
  <div class="container p-1">
    {% block mainContent %}
    {% endblock %}
  </div>
</div>
<div id="footer" class="container mt-2">
  <p>&nbsp;</p>
  <p><span style="color: red; font-weight: bold;">AX</span><span style="font-weight: bold;">Geofeed</span> by
    <a href="https://www.ax.wiki/" title="ax.wiki" style="text-decoration: none;" target="_blank">ax.wiki</a>
</div>
<br>
</body>
</html>
